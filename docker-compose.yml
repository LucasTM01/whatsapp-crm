services:
  waha:
    image: devlikeapro/waha
    ports:
      - "3000:3000"
    volumes:
      - waha_data:/app/.sessions
    environment:
      - WHATSAPP_START_SESSION=default
      - WHATSAPP_DEFAULT_ENGINE=WEBJS
      - WAHA_API_KEY=whatsapp-crm-local-key
    restart: unless-stopped

volumes:
  waha_data:
